<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor TI - Beauty Color</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    .info {
      position: absolute;
      top: 15px;
      right: 15px;
      color: #fff;
      background: rgba(0,0,0,0.75);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 100;
      font-family: Arial, sans-serif;
      display: none;
    }
  </style>
</head>
<body>

  <div class="info" id="info"></div>

  <script>
    const urls = [
      "https://grafana.byseven.com.br/d/DWSW-KSJD/alertas-de-monitoramento-zabbix?orgId=78&from=now-5m&to=now&timezone=browser&var-maintenance=$__all&var-Atuacao=$__all&kiosk",
      "https://helpdesk.beautycolor.com.br/front/ticket.php"
    ];

    let indice = 0;
    const segundos = 30;                    // tempo em cada tela
    const tempoMs = segundos * 1000;

    function mostrarInfo(texto) {
      const info = document.getElementById('info');
      info.textContent = texto;
      info.style.display = 'block';
      setTimeout(() => { info.style.display = 'none'; }, 2500);
    }

    function alternar() {
      indice = (indice + 1) % urls.length;
      window.location.href = urls[indice];
    }

    // Mostra qual tela está carregando
    function atualizarInfo() {
      const nomes = ["Grafana (BySeven)", "GLPI - Chamados"];
      mostrarInfo("Exibindo: " + nomes[indice] + " • Alternando em " + segundos + "s");
    }

    // Inicia
    window.onload = function() {
      atualizarInfo();
      setInterval(() => {
        alternar();
      }, tempoMs);
    };
  </script>
</body>
</html>
